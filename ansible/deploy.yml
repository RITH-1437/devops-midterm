---
- name: Deploy Spring Boot app to remote server
  hosts: deploy_server
  become: yes

  tasks:
    - name: Ensure target directory exists
      file:
        path: /var/www/html/Midterm-2026/Rin-Nairith
        state: directory
        mode: '0755'

    - name: Copy JAR file to remote server
      copy:
        src: "{{ jar_path }}"
        dest: /var/www/html/Midterm-2026/Rin-Nairith/demo.jar
        mode: '0755'

    - name: Copy index.html from build workspace
      copy:
        src: "{{ index_path }}"
        dest: /var/www/html/Midterm-2026/Rin-Nairith/index.html
        mode: '0644'

    - name: Add nginx location block for Rin-Nairith
      blockinfile:
        path: /etc/nginx/sites-enabled/et_anchhy
        marker: "# {mark} ANSIBLE MANAGED BLOCK Rin-Nairith"
        insertbefore: "^}"
        block: |
          location /Midterm-2026/Rin-Nairith {
              alias /var/www/html/Midterm-2026/Rin-Nairith/;
              index index.html;
              try_files $uri $uri/ =404;
          }

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Reload nginx config
      command: nginx -s reload
      ignore_errors: yes
