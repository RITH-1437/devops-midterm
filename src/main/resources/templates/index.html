<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Product Manager</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* --- 3 colors: #f5f5f5 (bg), #1a2b4a (primary dark blue), #ffffff (white) --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #1a2b4a;
            min-height: 100vh;
        }

        header {
            background: #1a2b4a;
            color: #ffffff;
            padding: 1rem 2rem;
        }
        header h1 { font-size: 1.4rem; font-weight: 600; }

        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        /* Form card */
        .card {
            background: #ffffff;
            border: 1px solid #d0d7e3;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #1a2b4a; }

        .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .form-row input {
            flex: 1;
            min-width: 140px;
            padding: 0.5rem 0.75rem;
            border: 1px solid #c0c8d8;
            border-radius: 4px;
            font-size: 0.9rem;
            background: #f5f5f5;
            color: #1a2b4a;
            outline: none;
        }
        .form-row input:focus { border-color: #1a2b4a; background: #ffffff; }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary { background: #1a2b4a; color: #ffffff; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
        .btn-edit { background: #1a2b4a; color: #ffffff; }
        .btn-delete { background: #f5f5f5; color: #1a2b4a; border: 1px solid #1a2b4a; }
        .btn-delete:hover { background: #1a2b4a; color: #ffffff; }
        .btn-cancel { background: #f5f5f5; color: #1a2b4a; border: 1px solid #c0c8d8; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead tr { background: #1a2b4a; color: #ffffff; }
        thead th { padding: 0.65rem 1rem; text-align: left; font-weight: 500; }
        tbody tr { border-bottom: 1px solid #e0e6f0; background: #ffffff; }
        tbody tr:hover { background: #f0f3f8; }
        tbody td { padding: 0.65rem 1rem; }
        .actions { display: flex; gap: 0.4rem; }

        /* Empty state */
        .empty { text-align: center; padding: 2rem; color: #7a8ba8; font-size: 0.9rem; }

        /* Toast */
        #toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: #1a2b4a; color: #ffffff;
            padding: 0.65rem 1.2rem; border-radius: 4px;
            font-size: 0.85rem; display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h1>Product Manager &mdash; CRUD</h1>
</header>

<main>

    <!-- Add / Edit Form -->
    <div class="card">
        <h2 id="form-title">Add Product</h2>
        <div class="form-row">
            <input id="f-name"  type="text"   placeholder="Name"        />
            <input id="f-desc"  type="text"   placeholder="Description" />
            <input id="f-price" type="number" placeholder="Price" step="0.01" min="0"/>
            <button class="btn btn-primary" onclick="submitForm()">Save</button>
            <button class="btn btn-cancel"  onclick="cancelEdit()" id="btn-cancel" style="display:none">Cancel</button>
        </div>
    </div>

    <!-- Product Table -->
    <div class="card">
        <h2>Products</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price ($)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="product-body">
                <tr><td colspan="5" class="empty">Loading...</td></tr>
            </tbody>
        </table>
    </div>

</main>

<div id="toast"></div>

<script>
    const API = '/api/products';
    let editingId = null;

    async function loadProducts() {
        const res = await fetch(API);
        const data = await res.json();
        const tbody = document.getElementById('product-body');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">No products yet. Add one above.</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(p => `
            <tr>
                <td>${p.id}</td>
                <td>${esc(p.name)}</td>
                <td>${esc(p.description)}</td>
                <td>${p.price != null ? p.price.toFixed(2) : '-'}</td>
                <td class="actions">
                    <button class="btn btn-sm btn-edit"   onclick="startEdit(${p.id}, '${esc(p.name)}', '${esc(p.description)}', ${p.price})">Edit</button>
                    <button class="btn btn-sm btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                </td>
            </tr>`).join('');
    }

    async function submitForm() {
        const name  = document.getElementById('f-name').value.trim();
        const desc  = document.getElementById('f-desc').value.trim();
        const price = parseFloat(document.getElementById('f-price').value);

        if (!name) { toast('Name is required'); return; }

        const body = JSON.stringify({ name, description: desc, price });
        const url  = editingId ? `${API}/${editingId}` : API;
        const method = editingId ? 'PUT' : 'POST';

        const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body });
        if (res.ok) {
            toast(editingId ? 'Product updated' : 'Product added');
            cancelEdit();
            loadProducts();
        } else {
            toast('Error saving product');
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Delete this product?')) return;
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (res.ok) { toast('Product deleted'); loadProducts(); }
    }

    function startEdit(id, name, description, price) {
        editingId = id;
        document.getElementById('f-name').value  = name;
        document.getElementById('f-desc').value  = description;
        document.getElementById('f-price').value = price;
        document.getElementById('form-title').textContent = `Edit Product #${id}`;
        document.getElementById('btn-cancel').style.display = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('f-name').value  = '';
        document.getElementById('f-desc').value  = '';
        document.getElementById('f-price').value = '';
        document.getElementById('form-title').textContent = 'Add Product';
        document.getElementById('btn-cancel').style.display = 'none';
    }

    function esc(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    loadProducts();
</script>
</body>
</html>
